name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o build/karazhan-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o build/karazhan-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o build/karazhan-darwin-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/karazhan-linux-amd64
            build/karazhan-darwin-amd64
            build/karazhan-darwin-arm64
